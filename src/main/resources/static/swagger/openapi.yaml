      summary: Записаться на курс
      description: |
        Записывает текущего авторизованного пользователя на курс.
        Email пользователя извлекается из JWT-токена (claim `sub`).

        Если пользователь уже записан на этот курс — возвращается `409 Conflict`.
        Требует авторизации (Bearer JWT).
      parameters:
        - name: courseId
          in: path
          required: true
          description: "ID курса"
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: "Пользователь успешно записан на курс"
          content:
            text/plain:
