  /api/v1/courses/demonstrate/{id}:
    get:
      tags: [ Courses ]
      summary: Получить полную информацию о курсе
      description: |
        Возвращает детальное представление курса, включая вложенный объект преподавателя и полный список уроков.

        Параметр `optimized` управляет стратегией загрузки данных из БД:
        - `false` (по умолчанию) — стандартный `findById`, связи загружаются лениво.
        - `true` — оптимизированный запрос с JOIN FETCH, загружающий все данные за один SQL-запрос (рекомендуется для продакшена).

        Требует авторизации (Bearer JWT).
      parameters:
        - name: id
          in: path
          required: true
          description: "ID курса"
          schema:
            type: integer
            format: int64
        - name: optimized
          in: query
          required: false
          description: "Использовать оптимизированный JOIN FETCH запрос"
          schema:
            type: boolean
            default: false
      responses:
        200:
          description: "Полная информация о курсе получена"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseFullResponseDto'
        401:
          description: "Пользователь не авторизован"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: "Курс с указанным ID не найден"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

