  /courses/{courseId}/lessons:
    parameters:
      - name: courseId
        in: path
        required: true
        description: "ID курса"
        schema:
          type: integer
          format: int64

    get:
      tags: [ Lessons ]
      summary: Получить все уроки курса
      description: |
        Возвращает список всех уроков, принадлежащих указанному курсу.
        Требует авторизации (Bearer JWT).
      responses:
        200:
          description: "Список уроков успешно получен"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LessonResponseDto'
        401:
          description: "Пользователь не авторизован"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [ Lessons ]
      summary: Создать урок в курсе
      description: |
        Создаёт новый урок и привязывает его к указанному курсу.
        Название урока должно быть **уникальным в пределах курса** — при дублировании вернётся `409 Conflict`.
        Требует авторизации (Bearer JWT).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonCreateDto'
      responses:
        201:
          description: "Урок успешно создан. В заголовке `Location` возвращается URI созданного ресурса."
          headers:
            Location:
              description: "URI созданного урока"
              schema:
                type: string
                example: "/courses/3/lessons/17"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonResponseDto'
        400:
          description: "Ошибка валидации — обязательные поля отсутствуют или не соответствуют ограничениям"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: "Пользователь не авторизован"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: "Курс с указанным ID не найден"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: "Урок с таким названием уже существует в этом курсе"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /courses/{courseId}/lessons/bulk:
    post:
      tags: [ Lessons ]
      summary: Пакетное добавление уроков в курс
      description: |
        Позволяет добавить несколько уроков за один запрос.

        Поведение зависит от параметра `isTrx`:
        - **`isTrx=true`** — все уроки сохраняются в одной транзакции. Если хотя бы один урок не пройдёт проверку (например, дублирующееся название), транзакция откатится и **ни один урок не будет сохранён**.
        - **`isTrx=false`** — уроки сохраняются последовательно вне транзакции. Успешно сохранённые уроки останутся в БД, даже если последующие вызовут ошибку.

        Название каждого урока должно быть **уникальным в пределах курса**.
        Требует авторизации (Bearer JWT).
      parameters:
        - name: courseId
          in: path
          required: true
          description: "ID курса"
          schema:
            type: integer
            format: int64
        - name: isTrx
          in: query
          required: true
          description: "Использовать единую транзакцию для всех уроков"
          schema:
            type: boolean
          example: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/LessonCreateDto'
      responses:
        201:
          description: "Все уроки успешно добавлены"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LessonResponseDto'
        400:
          description: "Ошибка валидации одного или нескольких уроков"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: "Пользователь не авторизован"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: "Курс с указанным ID не найден"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        409:
          description: "Один из уроков имеет название, уже существующее в этом курсе"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

